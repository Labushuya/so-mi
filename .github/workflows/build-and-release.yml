name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          # All package settings (release-type, package-name, changelog
          # sections, etc.) live in .release-please-config.json under
          # `packages."."`. The action's `with:` block carries only wiring.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973'

      - uses: gradle/actions/setup-gradle@v4
        with:
          # Pin to the exact wrapper version configured in
          # android/gradle/wrapper/gradle-wrapper.properties so the
          # bootstrap step below uses the same Gradle the wrapper
          # eventually pins to itself — keeps wrapper.jar reproducible.
          gradle-version: '8.10.2'

      - name: Bootstrap Gradle wrapper jar if missing
        # The wrapper jar is intentionally not committed in early Phase 1
        # (the user has no local Gradle to generate it). Once a clean
        # checkout has run this step, the jar in android/gradle/wrapper/
        # is overwritten by the canonical one matching gradle-wrapper.properties.
        # Idempotent: skips when the jar already exists.
        working-directory: android
        run: |
          if [[ ! -f gradle/wrapper/gradle-wrapper.jar ]]; then
            echo "wrapper jar missing; regenerating with gradle ${GRADLE_VERSION:-8.10.2}"
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          else
            echo "wrapper jar present; skipping regeneration"
          fi

      - name: Cache LLM models
        uses: actions/cache@v4
        with:
          path: ~/.cache/llm-models
          key: models-${{ hashFiles('scripts/download-models.sh') }}

      - name: Download LLM models (for asset bundle / smoke-test)
        run: bash scripts/download-models.sh

      - name: Verify keystore present
        run: test -f keystore/ci.keystore || (echo "::error::Run scripts/init-keystore.sh first" && exit 1)

      - name: Compute versionCode
        id: vc
        run: echo "code=$((10000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_versionCode: ${{ steps.vc.outputs.code }}
          ORG_GRADLE_PROJECT_versionName: ${{ needs.release-please.outputs.version }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Verify signature
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose "$APK"
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs "$APK" | grep SHA-256

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
